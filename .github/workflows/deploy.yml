---
name: Deploy Ether Music

on:
  workflow_call:
    inputs:
      version_tag:
        description: 'Tag de imagen a desplegar (opcional, formato vN.YYYYmmDD[-N])'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag de imagen a desplegar (opcional, formato vN.YYYYmmDD[-N])'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      K3S_NAMESPACE: mvps
      RELEASE_NAME: ether-music
      CHART_PATH: ./helm/ether-music
      IMAGE_REPOSITORY: ghcr.io/rafex/ether-music

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Helm
        uses: azure/setup-helm@v4.3.1

      - name: Resolve deploy image tag
        id: deploy_tag
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            IMAGE_TAG="${{ inputs.version_tag }}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.version_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="latest"
          fi

          if [ "$IMAGE_TAG" != "latest" ] && ! echo "$IMAGE_TAG" | grep -Eq '^v[0-9]+\.[0-9]{8}(-[0-9]+)?$'; then
            echo "Invalid deploy tag format: $IMAGE_TAG"
            echo "Expected format: vN.YYYYmmDD[-N] (examples: v1.20260424, v1.20260424-1)"
            exit 1
          fi

          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Deploy image: ${IMAGE_REPOSITORY}:$IMAGE_TAG"

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "$K3S_NAMESPACE" >/dev/null 2>&1 || kubectl create namespace "$K3S_NAMESPACE"

      - name: Lint chart
        run: |
          helm lint "$CHART_PATH"

      - name: Deploy Helm release
        id: helm_deploy
        continue-on-error: true
        run: |
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$K3S_NAMESPACE" \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="${{ steps.deploy_tag.outputs.value }}" \
            --wait --timeout 5m

      - name: Show rollout status
        id: rollout_status
        if: steps.helm_deploy.outcome == 'success'
        continue-on-error: true
        run: |
          kubectl -n "$K3S_NAMESPACE" rollout status deployment/"$RELEASE_NAME" --timeout=180s

      - name: Dump diagnostics on failed deploy
        if: steps.helm_deploy.outcome == 'failure' || steps.rollout_status.outcome == 'failure'
        run: |
          echo "=== Deployments ==="
          kubectl -n "$K3S_NAMESPACE" get deploy
          echo
          echo "=== Pods ==="
          kubectl -n "$K3S_NAMESPACE" get pods -o wide
          echo
          echo "=== PersistentVolumeClaims ==="
          kubectl -n "$K3S_NAMESPACE" get pvc
          echo
          echo "=== Describe deployment ==="
          kubectl -n "$K3S_NAMESPACE" describe deployment/"$RELEASE_NAME" || true
          echo
          echo "=== Recent events ==="
          kubectl -n "$K3S_NAMESPACE" get events --sort-by=.lastTimestamp | tail -n 50 || true
          echo
          echo "=== Pod details ==="
          kubectl -n "$K3S_NAMESPACE" describe pods \
            -l app.kubernetes.io/name=ether-music,app.kubernetes.io/instance="$RELEASE_NAME" || true
          echo
          echo "=== Deployment logs ==="
          kubectl -n "$K3S_NAMESPACE" logs deployment/"$RELEASE_NAME" --all-containers --tail=200 || true

      - name: Fail if Helm deploy did not succeed
        if: steps.helm_deploy.outcome == 'failure' || steps.rollout_status.outcome == 'failure'
        run: |
          echo "Helm deploy no alcanzo estado Ready dentro del timeout" >&2
          exit 1

      - name: Print deployed image reference
        if: steps.helm_deploy.outcome == 'success' && steps.rollout_status.outcome == 'success'
        run: |
          echo "Deployed image URL: ${IMAGE_REPOSITORY}:${{ steps.deploy_tag.outputs.value }}"
